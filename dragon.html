<!DOCTYPE html>
<html>
  <head>
    <title>Add History</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f4f9;
      }

      form {
        background: white;
        padding: 20px 40px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: center;
        width: 400px;
        margin-top: 40px;
      }

      .form-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
      }

      .form-row label {
        margin-right: 5px;
        font-weight: bold;
      }

      .form-row input {
        flex: 1;
        padding: 6px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      .radio-group {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      .radio-group label {
        margin: 0 10px;
        font-weight: normal;
      }

      button {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin: 5px;
      }

      button:hover {
        background-color: #45a049;
      }

      /* Animation scene */
      .scene {
        width: 600px;
        height: 400px;
        position: relative;
        background: #fff;
        margin: 20px;
        overflow: hidden;
      }
      .scene img { position: absolute; }

      #dragon {
        right: 20px;
        top: 50px;
        width: 250px;
        z-index: 2;
      }
      #bag {
        left: 200px;   /* start closer */
        top: 100px;    /* higher */
        width: 60px;   /* smaller */
        z-index: 1;
        display: none;
      }
      #pile {
        right: 50px;
        bottom: 0;
        width: 200px;
        z-index: 1;
      }
      #hand {
        left: 0;       /* comes from left */
        bottom: 50px;
        width: 70px;   /* smaller hand */
        z-index: 3;
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Form -->
    <form>
      <div class="radio-group">
        <input type="radio" id="income" name="type" value="income">
        <label for="income">Income</label>

        <input type="radio" id="expense" name="type" value="expense">
        <label for="expense">Expense</label>
      </div>

      <div class="form-row">
        <div>
          <label for="sector">Sector:</label>
          <input type="text" id="sector" name="sector" placeholder="Enter sector">
        </div>
        <div>
          <label for="amount">Amount:</label>
          <input type="number" id="amount" name="amount" placeholder="Enter amount">
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="date">Date:</label>
          <input type="date" id="date" name="date">
        </div>
        <div>
          <label for="time">Time:</label>
          <input type="time" id="time" name="time">
        </div>
      </div>

      <button type="submit">Submit</button>
      <button type="button" onclick="window.location.href='index.html'">Home</button>
      <button type="button" onclick="window.location.href='history.html'">History</button>
    </form>

    <!-- Animation scene -->
    <div class="scene">
      <img id="dragon" src="one.jpeg" alt="Dragon">
      <img id="bag" src="bagofgold.png" alt="Bag of Gold">
      <img id="pile" src="pileofgold.jpg" alt="Pile of Gold">
      <img id="hand" src="cartoonhand.png" alt="Hand">
    </div>

<script>
  const form = document.querySelector("form");
  const dragon = document.getElementById("dragon");
  const bag = document.getElementById("bag");
  const hand = document.getElementById("hand");

  // Dragon flapping: 5 times per second
  const dragonFrames = ["one.jpeg", "two.jpeg"];
  let dragonIndex = 0;
  setInterval(() => {
    dragonIndex = (dragonIndex + 1) % dragonFrames.length;
    dragon.src = dragonFrames[dragonIndex];
  }, 200); // 200ms per frame = 5Hz

  // Bag loop (income)
  function loopBag() {
    bag.style.display = "block";
    let pos = 200; // start closer
    const move = setInterval(() => {
      pos += 2; // slower
      bag.style.left = pos + "px";
      if (pos >= 380) { // vanish right when touching dragon
        clearInterval(move);
        bag.style.display = "none";
        setTimeout(loopBag, 2000);
      }
    }, 33);
  }

  // Hand loop (expense)
function loopHand() {
  hand.style.display = "block";
  let pos = 1000; // start from left edge
  const move = setInterval(() => {
    pos += 2; // slower
    hand.style.left = pos + "px";
    if (pos >= 330) { // stop exactly at pile
      clearInterval(move);
      hand.style.display = "none";
      setTimeout(loopHand, 2000);
    }
  }, 33);
}

  form.addEventListener("submit", function(event) {
    event.preventDefault(); 

    const type = document.querySelector('input[name="type"]:checked');
    const sector = document.getElementById("sector").value.trim();
    const amount = document.getElementById("amount").value.trim();
    const date = document.getElementById("date").value.trim();
    const time = document.getElementById("time").value.trim();

    if (!type || sector === "" || amount === "" || date === "" || time === "") {
      alert("Please fill out all fields before submitting.");
      return;
    }

    const entry = { type: type.value, sector, amount, date, time };
    let entries = JSON.parse(localStorage.getItem("entries")) || [];
    entries.push(entry);
    localStorage.setItem("entries", JSON.stringify(entries));

    alert("Entry saved!");
    form.reset();

    // Trigger animation loop based on type
    if (type.value === "income") {
      loopBag();
    } else {
      loopHand();
    }
  });
</script>
  </body>
</html>
