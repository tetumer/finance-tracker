<!DOCTYPE html>
<html>
  <head>
    <title>Alerts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="navbar"></div>
    <div class="notification">
      <span class="bell">🔔</span>
      <span class="badge">4</span>
    </div>

    <button id="addAlertBtn" class="dbutton">➕ Add Alert</button>

    <div id="alertFormPopup" class="popup" style="display:none;">
      <form id="alertForm">
        <h3>Add Alert</h3>
        <label for="amount">Amount:</label><br>
        <input type="number" id="amount" name="amount" required><br><br>

        <input type="radio" id="income" name="type" value="income" checked>
        <label for="income">Income</label>

        <input type="radio" id="expense" name="type" value="expense">
        <label for="expense">Expense</label><br><br>

        <label for="date">Date (YYYY-MM-DD):</label><br>
        <input type="date" id="date" name="date" required><br><br>

        <button type="submit" class="dbutton">Save Alert</button>
        <button type="button" id="closeForm" class="dbutton">Cancel</button>
      </form>
    </div>
    <div id="alerts"></div>

<script>
  fetch("nav.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });

  document.getElementById("addAlertBtn").addEventListener("click", () => {
    document.getElementById("alertFormPopup").style.display = "block";
  });

  document.getElementById("closeForm").addEventListener("click", () => {
    document.getElementById("alertFormPopup").style.display = "none";
  });

  const form = document.getElementById("alertForm");
  form.addEventListener("submit", function(event) {
    event.preventDefault();
    const type = document.querySelector('input[name="type"]:checked');
    const amount = document.getElementById("amount").value.trim();
    const date = document.getElementById("date").value.trim();

    if (!type || amount === "" || date === "") {
      alert("Please fill out all fields before submitting.");
      return; 
    }

    const alertEntry = { type: type.value, amount, date };

    let alerts = JSON.parse(localStorage.getItem("alerts")) || [];
    alerts.push(alertEntry);
    localStorage.setItem("alerts", JSON.stringify(alerts));

    form.reset();
    document.getElementById("alertFormPopup").style.display = "none";
    renderAlerts();
  });

  function renderAlerts() {
    const alerts = JSON.parse(localStorage.getItem("alerts")) || [];
    const container = document.getElementById("alerts");
    container.innerHTML = "";

    alerts
      .filter(alert => alert.type === "expense") // only expense alerts shown
      .forEach(alert => {
        const alertDiv = document.createElement("div");
        alertDiv.className = "alert-item";

        const now = new Date();
        const endDate = new Date(alert.date);
        const totalDays = Math.ceil((endDate - now) / (1000 * 60 * 60 * 24));

        const percentLeft = Math.max(0, Math.min(100, (totalDays / 30) * 100));

        alertDiv.innerHTML = `
          <h4>Alert</h4>
          <p>Amount: ${alert.amount}</p>
          <p>Due: ${alert.date} (${totalDays} day(s) left)</p>
          <div class="meter">
            <div class="progress" style="width:${percentLeft}%"></div>
          </div>
        `;
        container.appendChild(alertDiv);
      });
  }

  renderAlerts();
</script>

  </body>
</html>
