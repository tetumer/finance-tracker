<!DOCTYPE html>
<html>
  <head>
    <title>Goal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="scrip.js"></script>
  </head>
  <body>
    <div id="navbar"></div>
    <div class="notification">
      <span class="bell">🔔</span>
      <span class="badge">4</span>
    </div>

    <!-- Stylish Add Goal button -->
    <button id="addGoalBtn" class="dbutton">🎯 Add Goal</button>

    <!-- Popup form (hidden by default) -->
    <div id="goalFormPopup" class="popup" style="display:none;">
      <form id="goalForm">
        <h3>Add Goal</h3>
        <label for="amount">Amount:</label><br>
        <input type="number" id="amount" name="amount" required><br><br>

        <!-- Keep both options, but only income goals will be shown here -->
        <input type="radio" id="income" name="type" value="income" checked>
        <label for="income">Income</label>

        <input type="radio" id="expense" name="type" value="expense">
        <label for="expense">Expense</label><br><br>

        <label for="date">Date (YYYY-MM-DD):</label><br>
        <input type="date" id="date" name="date" required><br><br>

        <button type="submit" class="dbutton">Save Goal</button>
        <button type="button" id="closeForm" class="dbutton">Cancel</button>
      </form>
    </div>

    <div id="goals"></div>

    <script>
      fetch("nav.html")
        .then(response => response.text())
        .then(data => {
          document.getElementById("navbar").innerHTML = data;
        });
      document.getElementById("addGoalBtn").addEventListener("click", () => {
        document.getElementById("goalFormPopup").style.display = "block";
      });
      document.getElementById("closeForm").addEventListener("click", () => {
        document.getElementById("goalFormPopup").style.display = "none";
      });

      const form = document.getElementById("goalForm");
      form.addEventListener("submit", function(event) {
        event.preventDefault();

        const type = document.querySelector('input[name="type"]:checked').value;
        const amount = document.getElementById("amount").value;
        const date = document.getElementById("date").value;

        const goalEntry = { type, amount, date };

        let goals = JSON.parse(localStorage.getItem("alerts")) || [];
        goals.push(goalEntry);
        localStorage.setItem("alerts", JSON.stringify(goals));

        form.reset();
        document.getElementById("goalFormPopup").style.display = "none";
        renderGoals();
      });

      function renderGoals() {
        const goals = JSON.parse(localStorage.getItem("alerts")) || [];
        const container = document.getElementById("goals");
        container.innerHTML = "";

        goals
          .filter(goal => goal.type === "income") 
          .forEach(goal => {
            const goalDiv = document.createElement("div");
            goalDiv.className = "goal-item";

            const now = new Date();
            const endDate = new Date(goal.date);
            const totalDays = Math.ceil((endDate - now) / (1000 * 60 * 60 * 24));

            const percentLeft = Math.max(0, Math.min(100, (totalDays / 30) * 100));

            goalDiv.innerHTML = `
              <h4>Goal</h4>
              <p>Amount: ${goal.amount}</p>
              <p>Due: ${goal.date} (${totalDays} day(s) left)</p>
              <div class="meter">
                <div class="progress" style="width:${percentLeft}%"></div>
              </div>
            `;
            container.appendChild(goalDiv);
          });
      }
      renderGoals();
    </script>
  </body>
</html>
